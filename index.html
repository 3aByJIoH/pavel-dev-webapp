<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ разработки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #222222);
    --hint: var(--tg-theme-hint-color, #888888);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f2f4f7);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px 16px 96px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--hint); font-size: 14px; margin-bottom: 20px; }
  h2 { font-size: 15px; margin: 18px 0 10px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .card {
    background: var(--secondary-bg);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card.active { border-color: var(--button); }
  .card .t { font-weight: 600; font-size: 14px; }
  .card .p { color: var(--hint); font-size: 13px; margin-top: 4px; }
  .opt {
    display: flex; align-items: center; gap: 10px;
    background: var(--secondary-bg);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .opt input { width: 18px; height: 18px; accent-color: var(--button); }
  .opt .name { flex: 1; font-size: 14px; }
  .opt .price { color: var(--hint); font-size: 13px; white-space: nowrap; }
  textarea, input[type=text] {
    width: 100%;
    background: var(--secondary-bg);
    color: var(--text);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
  }
  textarea { min-height: 76px; }
  .total {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--secondary-bg);
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .total .label { color: var(--hint); font-size: 13px; }
  .total .sum { font-size: 20px; font-weight: 700; }
  .note { color: var(--hint); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Расчёт стоимости</h1>
  <div class="sub">Выберите, что нужно, и получите ориентир цены сразу</div>

  <h2>Что делаем</h2>
  <div class="cards" id="types"></div>

  <h2>Дополнительно</h2>
  <div id="opts"></div>

  <h2>Пара слов о задаче</h2>
  <textarea id="task" placeholder="Своими словами: что должно получиться"></textarea>

  <h2>Как с вами связаться</h2>
  <input type="text" id="contact" placeholder="Телефон, @ник или почта (или напишу здесь, в боте)">
  <div class="note">Итог: ориентир для старта разговора, не оферта. Точную цену назову после уточнения задачи.</div>

  <div class="total">
    <div>
      <div class="label">Ориентир стоимости</div>
      <div class="sum" id="sum">от 500 ₽</div>
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const TYPES = [
    { id: "bot",    t: "Telegram-бот",   base: 500,  p: "от 500 ₽" },
    { id: "webapp", t: "Mini App",        base: 3000, p: "от 3000 ₽" },
    { id: "script", t: "Парсер / скрипт", base: 500,  p: "от 500 ₽" },
    { id: "iot",    t: "Arduino / ESP32", base: 500,  p: "от 500 ₽" },
  ];
  const OPTS = [
    { id: "api",    name: "Интеграция с API или таблицей", price: 1500 },
    { id: "admin",  name: "Админ-панель",                  price: 2500 },
    { id: "pay",    name: "Приём оплат",                   price: 3000 },
    { id: "deploy", name: "Размещение на сервере, 24/7",   price: 1000 },
  ];

  let typeId = "bot";
  const picked = new Set();

  const typesEl = document.getElementById("types");
  TYPES.forEach(x => {
    const d = document.createElement("div");
    d.className = "card" + (x.id === typeId ? " active" : "");
    d.innerHTML = `<div class="t">${x.t}</div><div class="p">${x.p}</div>`;
    d.onclick = () => {
      typeId = x.id;
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      d.classList.add("active");
      recalc();
    };
    typesEl.appendChild(d);
  });

  const optsEl = document.getElementById("opts");
  OPTS.forEach(x => {
    const l = document.createElement("label");
    l.className = "opt";
    l.innerHTML = `<input type="checkbox"><span class="name">${x.name}</span><span class="price">+${x.price} ₽</span>`;
    l.querySelector("input").onchange = (e) => {
      e.target.checked ? picked.add(x.id) : picked.delete(x.id);
      recalc();
    };
    optsEl.appendChild(l);
  });

  function total() {
    const base = TYPES.find(x => x.id === typeId).base;
    return base + OPTS.filter(x => picked.has(x.id)).reduce((s, x) => s + x.price, 0);
  }

  function recalc() {
    document.getElementById("sum").textContent = "от " + total().toLocaleString("ru-RU") + " ₽";
    tg.MainButton.setText("Отправить заявку · от " + total().toLocaleString("ru-RU") + " ₽");
    tg.MainButton.show();
  }

  tg.MainButton.onClick(() => {
    const data = {
      type: TYPES.find(x => x.id === typeId).t,
      options: OPTS.filter(x => picked.has(x.id)).map(x => x.name),
      estimate: total(),
      task: document.getElementById("task").value.trim(),
      contact: document.getElementById("contact").value.trim(),
    };
    try {
      tg.sendData(JSON.stringify(data));
    } catch (e) {
      tg.showAlert("Не получилось отправить. Откройте приложение через кнопку внизу чата с ботом.");
    }
  });

  recalc();
</script>
</body>
</html>
